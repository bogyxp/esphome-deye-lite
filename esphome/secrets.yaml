# Wi-Fi credentials
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# Home Assistant API encryption key
api_encryption_key: "YOUR_ENCRYPTION_KEY"

# Password for OTA firmware updates
ota_password: "YOUR_OTA_PASSWORD"

# Fallback hotspot password (used when the module cannot connect to Wi-Fi)
hotspot_pass: "YOUR_HOTSPOT_PASSWORD"

# Username and password for the built-in web interface
web_user: "YOUR_WEB_USERNAME"
web_password: "YOUR_WEB_PASSWORD"